<html>
  <head>
    <title>Person Profile</title>
    <style>
      .errorMsg {
        color: red;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <form onsubmit="return validateForm();">
      <table border="1" cellspacing="0" cellpadding="5" width="400">
        <tr>
          <td colspan="3" align="center">
            <h3>PERSON PROFILE</h3>
          </td>
        </tr>

        <tr>
          <td width="100">Name</td>
          <td>
            <input type="text" id="name" name="name" style="width: 200px" />
          </td>
          <td width="20"><span id="nameErr" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td>Email</td>
          <td>
            <input type="text" id="email" name="email" style="width: 200px" />
          </td>
          <td><span id="emailErr" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td>Gender</td>
          <td>
            <input type="radio" name="gender" value="Male" id="male" />
            <label for="male">Male</label>
            <input type="radio" name="gender" value="Female" id="female" />
            <label for="female">Female</label>
            <input type="radio" name="gender" value="Other" id="other" />
            <label for="other">Other</label>
          </td>
          <td><span id="genderErr" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td>Date of Birth</td>
          <td>
            <input type="text" id="day" name="day" size="2" maxlength="2" /> /
            <input type="text" id="month" name="month" size="2" maxlength="2" />
            /
            <input type="text" id="year" name="year" size="4" maxlength="4" />
            <span style="font-size: small">(dd/mm/yyyy)</span>
          </td>
          <td><span id="dobErr" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td>Blood Group</td>
          <td>
            <select id="bloodgroup" name="bloodgroup">
              <option value="">--Select--</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="O+">O+</option>
            </select>
          </td>
          <td><span id="bloodErr" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td>Degree</td>
          <td>
            <input type="checkbox" name="degree" value="SSC" /> SSC
            <input type="checkbox" name="degree" value="HSC" /> HSC
            <input type="checkbox" name="degree" value="BSc" /> BSc.
            <input type="checkbox" name="degree" value="MSc" /> MSc.
          </td>
          <td><span id="degreeErr" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td>Photo</td>
          <td>
            <input type="file" id="photo" name="photo" />
          </td>
          <td><span id="photoErr" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td colspan="3" height="30"></td>
        </tr>

        <tr>
          <td colspan="3" align="right">
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" onclick="clearErrors()" />
          </td>
        </tr>
      </table>
    </form>

    <script>
      function clearErrors() {
        [
          "nameErr",
          "emailErr",
          "genderErr",
          "dobErr",
          "bloodErr",
          "degreeErr",
          "photoErr",
        ].forEach((id) => (document.getElementById(id).innerHTML = ""));
      }

      function validateForm() {
        clearErrors();
        let valid = true;

        let name = document.getElementById("name").value.trim();
        let nameErr = document.getElementById("nameErr");

        if (name === "") {
          nameErr.innerHTML = "Name cannot be empty!";
          valid = false;
        } else {
          let words = name.split(" ");
          if (words.length < 2) {
            nameErr.innerHTML = "Name must contain at least two words";
            valid = false;
          } else {
            let firstChar = name.charAt(0);
            if (
              !(firstChar >= "A" && firstChar <= "Z") &&
              !(firstChar >= "a" && firstChar <= "z")
            ) {
              nameErr.innerHTML = "Name must start with a letter";
              valid = false;
            } else {
              for (let i = 0; i < name.length; i++) {
                let ch = name.charAt(i);
                if (
                  !(
                    (ch >= "A" && ch <= "Z") ||
                    (ch >= "a" && ch <= "z") ||
                    ch === "." ||
                    ch === "-" ||
                    ch === " "
                  )
                ) {
                  nameErr.innerHTML =
                    "Name can contain only letters, dot(.) or dash(-)";
                  valid = false;
                  break;
                }
              }
            }
          }
        }

        let email = document.getElementById("email").value;
        let emailErr = document.getElementById("emailErr");

        if (email == "") {
          emailErr.innerHTML = "Email cannot be empty!";
          valid = false;
        } else if (!email.includes("@") || !email.includes(".")) {
          emailErr.innerHTML = "Enter a valid email";
          valid = false;
        }

        let gender = document.querySelector('input[name="gender"]:checked');
        let genderErr = document.getElementById("genderErr");

        if (!gender) {
          genderErr.innerHTML = "Select a gender";
          valid = false;
        }

        let d = document.getElementById("day").value;
        let m = document.getElementById("month").value;
        let y = document.getElementById("year").value;
        let dobErr = document.getElementById("dobErr");

        if (d == "" || m == "" || y == "") {
          dobErr.innerHTML = "Date cannot be empty!";
          valid = false;
        } else if (d < 1 || d > 31) {
          dobErr.innerHTML = "Day must be between 1-31";
          valid = false;
        } else if (m < 1 || m > 12) {
          dobErr.innerHTML = "Month must be between 1-12";
          valid = false;
        } else if (y < 1900 || y > 2016) {
          dobErr.innerHTML = "Year must be between 1900-2016";
          valid = false;
        }

        let blood = document.getElementById("bloodgroup").value;
        let bloodErr = document.getElementById("bloodErr");

        if (blood === "") {
          bloodErr.innerHTML = "Please select a blood group";
          valid = false;
        }

        let checked = document.querySelectorAll('input[name="degree"]:checked');
        let degreeErr = document.getElementById("degreeErr");

        if (checked.length == 0) {
          degreeErr.innerHTML = "Select at least one degree";
          valid = false;
        }

        let picture = document.getElementById("photo").value;
        let photoErr = document.getElementById("photoErr");

        if (picture === "") {
          photoErr.innerHTML = "Please upload a picture";
          valid = false;
        }

        if (valid) {
          alert("Profile submitted successfully!");
        }

        return valid;
      }
    </script>
  </body>
</html>
