<html>
  <head>
    <title>Lab Task - 4</title>
    <style>
      .errorMsg {
        color: red;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <form onsubmit="return validateDOB();">
      <table>
        <tr>
          <td>
            <fieldset>
              <legend>Date of Birth</legend>

              dd <input type="text" id="day" size="2" maxlength="2" /> / mm
              <input type="text" id="month" size="2" maxlength="2" /> / yyyy
              <input type="text" id="year" size="4" maxlength="4" />

              <br />
              <span id="errorMsg" class="errorMsg"></span>
              <hr />

              <input type="submit" value="Submit" />
            </fieldset>
          </td>
        </tr>
      </table>
    </form>

    <script>
      function validateDOB() {
        let d = document.getElementById("day").value;
        let m = document.getElementById("month").value;
        let y = document.getElementById("year").value;
        let err = document.getElementById("errorMsg");

        err.innerHTML = "";

        if (d == "" || m == "" || y == "") {
          err.innerHTML = "Date cannot be empty!";
          return false;
        }

        if (d < 1 || d > 31) {
          err.innerHTML = "Day must be between 1-31";
          return false;
        }

        if (m < 1 || m > 12) {
          err.innerHTML = "Month must be between 1-12";
          return false;
        }

        if (y < 1900 || y > 2016) {
          err.innerHTML = "Year must be between 1900-2016";
          return false;
        }

        alert("DOB submitted successfully: " + d + "/" + m + "/" + y);

        return true;
      }
    </script>
  </body>
</html>
