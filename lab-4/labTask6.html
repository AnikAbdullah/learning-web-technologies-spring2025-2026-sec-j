<html>
  <head>
    <title>Blood Group Validation</title>
    <style>
      .errorMsg {
        color: red;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <form onsubmit="return validateBlood();">
      <table>
        <tr>
          <td><label for="blood">Blood Group</label></td>
          <td>
            <select id="blood">
              <option value="">--Select--</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="O+">O+</option>
            </select>
          </td>
        </tr>

        <tr>
          <td colspan="2"><span id="errorMsg" class="errorMsg"></span></td>
        </tr>

        <tr>
          <td colspan="2"><input type="submit" value="Submit" /></td>
        </tr>
      </table>
    </form>

    <script>
      function validateBlood() {
        let blood = document.getElementById("blood").value;
        let err = document.getElementById("errorMsg");

        err.innerHTML = "";

        return blood === ""
          ? ((err.innerHTML = "Please select a blood group"), false)
          : (alert(
              "Form submitted successfully! Selected Blood Group: " + blood,
            ),
            true);
      }
    </script>
  </body>
</html>
