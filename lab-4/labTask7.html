<!doctype html>
<html>
  <head>
    <title>Lab Task - 7</title>
    <style>
      .errorMsg {
        color: red;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <form onsubmit="return validateProfile();">
      <table>
        <tr>
          <td>
            <fieldset>
              <legend>Profile Picture</legend>

              <label>User Id</label>
              <input type="text" id="userId" />
              <br /><br />

              <label>Picture</label>
              <input type="file" id="picture" />
              <br /><br />

              <span id="errorMsg" class="errorMsg"></span>
              <hr />

              <input type="submit" value="Submit" />
            </fieldset>
          </td>
        </tr>
      </table>
    </form>

    <script>
      function validateProfile() {
        let userId = document.getElementById("userId").value.trim();
        let picture = document.getElementById("picture").value;
        let err = document.getElementById("errorMsg");

        err.innerHTML = "";

        if (userId === "" || isNaN(userId) || Number(userId) <= 0) {
          err.innerHTML = "User ID must be a positive number";
          return false;
        }

        if (picture === "") {
          err.innerHTML = "Please upload a picture";
          return false;
        }

        alert("Profile submitted successfully!");
        return true;
      }
    </script>
  </body>
</html>
